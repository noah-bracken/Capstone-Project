<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMark</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/class.js" defer></script>
</head>
    <body>
        <header>
            <h1>NOMark</h1>
            <button onclick="window.location.href='class.html'">↩ Back to Class page</button>
        </header>
        <div id="times-id">
            <button class="times-button">Set Meeting Times</button>
        </div>
        <div class="days-week">
            <div class="days">
                <input type="Checkbox" id="sun">S</input>
                <input type="Checkbox" id="mon">M</input>
                <input type="Checkbox" id="tue">T</input>
                <input type="Checkbox" id="wed">W</input>
                <input type="Checkbox" id="thu">TH</input>
                <input type="Checkbox" id="fri">F</input>
                <input type="Checkbox" id="sat">S</input>
            </div>
        </div>
        <div>
            <button class="button">Set Late Deadline</button>
        </div>
    </body>
</html>
